name: GPU CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_CACHE_DIR: .uv-cache
  MINKOWSKI_BLAS: openblas
  MINKOWSKI_FORCE_CUDA: "1"
  MINKOWSKI_LEAK_TEST_ITER: "1"
  GPU_TEST_MODULES: >-
    tests.python.convolution
    tests.python.pool
    tests.python.broadcast
    tests.python.pruning
    tests.python.union
    tests.python.interpolation
    tests.python.spmm
    tests.python.sparse_tensor
    tests.python.coordinate_manager
    tests.python.quantization

jobs:
  linux-gpu:
    name: gpu py${{ matrix.python-version }} torch${{ matrix.torch-version }} ${{ matrix.torch-index }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - nvidia
      - ${{ matrix.runner-label }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            torch-version: "2.5.0"
            torch-index: "cu124"
            runner-label: "cuda-12-4"
            cuda-home: "/usr/local/cuda-12.4"
          - python-version: "3.11"
            torch-version: "2.6.0"
            torch-index: "cu126"
            runner-label: "cuda-12-6"
            cuda-home: "/usr/local/cuda-12.6"
          - python-version: "3.12"
            torch-version: "2.7.0"
            torch-index: "cu128"
            runner-label: "cuda-12-8"
            cuda-home: "/usr/local/cuda-12.8"
          - python-version: "3.13"
            torch-version: "2.9.0"
            torch-index: "cu130"
            runner-label: "cuda-13-0"
            cuda-home: "/usr/local/cuda-13.0"
          - python-version: "3.13"
            torch-version: "2.10.0"
            torch-index: "cu130"
            runner-label: "cuda-13-0"
            cuda-home: "/usr/local/cuda-13.0"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4

      - name: Create virtual environment
        run: uv venv .venv --python "${{ matrix.python-version }}"

      - name: Install Python dependencies
        run: |
          uv pip install --python .venv/bin/python "setuptools>=69" wheel packaging
          uv pip install --python .venv/bin/python "torch==${{ matrix.torch-version }}" \
            --index-url https://download.pytorch.org/whl/${{ matrix.torch-index }}
          uv pip install --python .venv/bin/python numpy ninja

      - name: Build MinkowskiEngine
        env:
          CUDA_HOME: ${{ matrix.cuda-home }}
        run: |
          uv pip install --python .venv/bin/python --no-build-isolation -v .

      - name: Run GPU unittest suite
        env:
          CUDA_HOME: ${{ matrix.cuda-home }}
        run: |
          uv run --no-sync --python .venv/bin/python python -m unittest $GPU_TEST_MODULES
